<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>묵은지 관리자 페이지</title>
    <link rel="stylesheet" href="/static/admin/admin.css">
</head>
<body>
    <div id="login-section" class="page-container">
        <div class="login-box">
            <h1>관리자 로그인</h1>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="username">사용자명</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">로그인</button>
            </form>
            <div id="login-message-area"></div>
            <p style="text-align:center;margin-top:16px;"><a href="/">돌아가기</a></p>
        </div>
    </div>

    <div id="main-section" class="hidden">
        <header>
            <h1>실시간 신청 현황</h1>
            <span id="welcome-message"></span>
            <button id="logout-button" class="btn-danger">로그아웃</button>
        </header>
        <main>
            <div id="grid-panel">
                <div id="reservation-grid-container"></div>
            </div>
            <div id="control-panel">
                <div class="control-group">
                    <h3>선택 시간 관리</h3>
                    <input type="text" id="target-username" placeholder="대상 사용자명">
                    <div class="button-group">
                        <button id="delete-reservation-button">선택 시간 삭제</button>
                        <button id="force-reserve-button">선택 시간 신청</button>
                    </div>
                </div>
                <div class="control-group">
                    <h3>설정</h3>
                    <div class="setting-item">
                        <label for="setting-reservation-enabled">신청 활성화</label>
                        <input type="checkbox" id="setting-reservation-enabled">
                    </div>
                    <div class="form-group">
                        <label for="setting-opens-at">신청 시작 예약</label>
                        <input type="datetime-local" id="setting-opens-at">
                    </div>
                    <button id="save-settings-button">설정 저장</button>
                </div>
                <div class="control-group">
                    <h3>요금제 기본 가격</h3>
                    <div id="plan-prices-container"></div>
                </div>
                <div class="control-group">
                    <h3>다음 달 정산</h3>
                    <p>말일 정기 신청 전에 다음 달 정산을 열고 입금을 확인하세요.</p>
                    <div class="setting-item">
                        <label for="settlement-period">정산 대상 월 (YYYY-MM)</label>
                        <input type="text" id="settlement-period" placeholder="예: 2026-04">
                    </div>
                    <div class="button-group">
                        <button id="open-settlement-button">다음 달 정산 열기</button>
                        <button id="close-settlement-button" class="btn-danger">정산 마감</button>
                    </div>
                    <div id="settlement-status" class="settlement-status"></div>
                    <button id="copy-settlement-text-button" class="btn-link">카카오 정산 문구 복사</button>
                </div>
                <div class="control-group">
                    <h3>입금 관리</h3>
                    <div id="billing-list-container" class="billing-list"></div>
                </div>
                <div class="control-group">
                    <h3>사용자 관리</h3>
                    <div class="button-group">
                        <button id="view-users-button" class="btn-link">회원 목록 / 수정</button>
                    </div>
                    <details class="legacy-block">
                        <summary>레거시 CSV 업로드</summary>
                        <input type="file" id="csv-file-input" accept=".csv">
                        <button id="upload-csv-button">CSV 업로드</button>
                    </details>
                </div>
                <button id="clear-all-reservations-button">시간표 전체 초기화</button>
            </div>
        </main>
        <footer>
            <div id="message-area"></div>
        </footer>
    </div>

    <div id="user-modal" class="modal hidden">
        <div class="modal-content modal-wide">
            <span class="modal-close-button">&times;</span>
            <h2>회원 관리</h2>
            <div id="user-list-container"></div>
        </div>
    </div>

    <div id="edit-user-modal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close-button edit-close">&times;</span>
            <h2>회원 수정</h2>
            <form id="edit-user-form">
                <input type="hidden" id="edit-username">
                <div class="form-group">
                    <label for="edit-plan">요금제</label>
                    <select id="edit-plan"></select>
                </div>
                <div class="form-group">
                    <label for="edit-custom-hours">커스텀 이용시간 (비우면 요금제 기본값)</label>
                    <input type="number" id="edit-custom-hours" min="0" max="24">
                </div>
                <div class="form-group">
                    <label for="edit-custom-fee">커스텀 월 비용 (비우면 요금제 기본값)</label>
                    <input type="number" id="edit-custom-fee" min="0">
                </div>
                <div class="setting-item">
                    <label for="edit-auto-renew">자동 갱신</label>
                    <input type="checkbox" id="edit-auto-renew" checked>
                </div>
                <button type="submit">저장</button>
            </form>
        </div>
    </div>

    <script src="/static/admin/admin.js"></script>
</body>
</html>
