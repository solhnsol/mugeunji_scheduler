<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>묵은지 작업실</title>
    <link rel="stylesheet" href="/static/general/style.css">
</head>
<body>
    <div class="container">
        <h1>묵은지 작업실</h1>
        
        <section id="login-section">
            <h2>로그인</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">사용자명</label>
                    <input type="text" id="login-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <button type="submit">로그인</button>
            </form>
            <p class="section-links">
                <button type="button" id="show-register-button" class="btn-link">회원가입</button>
                <button type="button" onclick="window.location.href='/admin'" class="btn-link">관리자 로그인</button>
            </p>
        </section>

        <section id="register-section" class="hidden">
            <h2>회원가입</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">아이디</label>
                    <input type="text" id="register-username" name="username" required minlength="2">
                </div>
                <div class="form-group">
                    <label for="register-password">비밀번호</label>
                    <input type="password" id="register-password" name="password" required minlength="4">
                </div>
                <div class="form-group">
                    <label for="register-email">이메일</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <button type="submit">가입하기</button>
            </form>
            <p class="section-links">
                <button type="button" id="show-login-button" class="btn-link">로그인으로 돌아가기</button>
            </p>
        </section>

        <section id="plan-section" class="hidden">
            <div id="plan-user-info" class="info-box">
                <p><strong id="plan-welcome-message"></strong>님, 환영합니다!</p>
                <button id="plan-logout-button" class="btn-danger">로그아웃</button>
            </div>
            <h2>요금제 신청</h2>
            <p class="info-text">이용을 시작하려면 아래 요금제 중 하나를 선택해주세요.</p>
            <div id="plans-container" class="plans-grid"></div>
        </section>

        <section id="pending-section" class="hidden">
            <div class="info-box">
                <p><strong id="pending-welcome-message"></strong>님</p>
                <button id="pending-logout-button" class="btn-danger">로그아웃</button>
            </div>
            <div class="status-card">
                <h2>입금 확인 대기 중</h2>
                <p id="pending-message"></p>
                <div id="pending-billing-info"></div>
                <hr>
                <h3>요금제 변경 (다음 달부터)</h3>
                <div id="pending-plans-container" class="plans-grid compact"></div>
            </div>
        </section>

        <section id="reservation-section" class="hidden">
            <div id="user-info">
                <p><strong id="welcome-message"></strong>님, 안녕하세요!</p>
                <p>신청 가능 시간: <strong id="allowed-hours"></strong> 시간</p>
                <p id="subscription-info" class="sub-info"></p>
                <button id="logout-button" class="btn-danger">로그아웃</button>
            </div>
            
            <h2>시간 신청하기</h2>
            <div id="reservation-notice" class="message-success notice-banner"></div>
            <div id="reservation-grid-container"></div>
            <button id="submit-reservation-button">신청하기 (취소 불가)</button>
            <div id="plan-change-area" class="plan-change-area hidden">
                <h3>다음 달 요금제 변경</h3>
                <div id="active-plans-container" class="plans-grid compact"></div>
            </div>
        </section>

        <div id="message-area"></div>
    </div>

    <script src="/static/general/script.js"></script>
</body>
</html>
